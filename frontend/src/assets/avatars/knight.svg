  <rect x="30" y="16" width="20" height="6" rx="1" fill="#a78bfa" opacity="0.3"/>
  <!-- Very broad armored chest -->
  <rect x="20" y="30" width="40" height="34" rx="6" fill="#a78bfa" opacity="0.82"/>
