# Sert la SPA React (fallback index.html pour le routing client).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long pour les assets fingerprintés
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
