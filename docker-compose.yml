# FitQuest — Stack de développement
# Frontend (Vite dev server) + Backend (nodemon) + PostgreSQL
# Usage : docker compose up -d
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fitquest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fitquest}
      POSTGRES_DB: ${POSTGRES_DB:-fitquest}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fitquest}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npm run dev"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fitquest}:${POSTGRES_PASSWORD:-fitquest}@db:5432/${POSTGRES_DB:-fitquest}
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - uploads:/app/uploads
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      VITE_API_URL: http://backend:3001
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  backend_node_modules:
  frontend_node_modules:
  uploads:
